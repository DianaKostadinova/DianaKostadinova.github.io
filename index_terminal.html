<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diana Kostadinova — Resume</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0c0c0c;
  --surface: #111;
  --hdr:     #1a1a1a;
  --border:  #252525;
  --green:   #3fb950;
  --cyan:    #58d1b5;
  --yellow:  #e5c07b;
  --orange:  #ce9178;
  --blue:    #79b8ff;
  --purple:  #b392f0;
  --comment: #4d8a3e;
  --text:    #c9d1d9;
  --dim:     #5a5a5a;
  --dimmer:  #2e2e2e;
  --err:     #f47067;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%;
  background: #080808;
  font-family: 'JetBrains Mono', 'Cascadia Code', 'Courier New', monospace;
  color: var(--text);
  font-size: 13px;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

/* ═══════════════ TERMINAL SHELL ═══════════════ */
.terminal {
  background: var(--bg);
  border-radius: 10px;
  width: 100%;
  max-width: 960px;
  height: 92vh;
  max-height: 860px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 30px 90px rgba(0,0,0,.95), 0 0 0 1px var(--border);
  overflow: hidden;
}

/* ═══════════════ TITLE BAR ═══════════════ */
.titlebar {
  flex-shrink: 0;
  background: var(--hdr);
  padding: 11px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  user-select: none;
}
.dots { display:flex; gap:7px; }
.dot  { width:13px; height:13px; border-radius:50%; cursor:default; }
.dot.r { background:#ff5f57; }
.dot.y { background:#febc2e; }
.dot.g { background:#28c840; }
.titlebar-text { flex:1; text-align:center; font-size:11px; color:#3a3a3a; letter-spacing:.4px; }

/* ═══════════════ OUTPUT AREA ═══════════════ */
.output {
  flex: 1;
  overflow-y: auto;
  padding: 20px 26px;
  line-height: 1.65;
  scroll-behavior: smooth;
}
.output::-webkit-scrollbar { width: 4px; }
.output::-webkit-scrollbar-track { background: transparent; }
.output::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

/* ═══════════════ NAV PILLS ═══════════════ */
.nav-bar {
  flex-shrink: 0;
  padding: 8px 26px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  border-top: 1px solid var(--border);
  background: #0e0e0e;
}
.pill {
  font-family: inherit;
  font-size: 11px;
  background: transparent;
  color: var(--dim);
  border: 1px solid var(--dimmer);
  border-radius: 3px;
  padding: 3px 10px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.pill:hover { border-color: var(--green); color: var(--green); background: #0d1a0d; }
.pill.active { border-color: var(--cyan); color: var(--cyan); background: #0a1a1a; }
.pill.special { border-color: #333; color: var(--dim); font-style: italic; }

/* ═══════════════ INPUT BAR ═══════════════ */
.input-bar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 26px;
  border-top: 1px solid var(--border);
  background: #0a0a0a;
}
.input-prompt { color: var(--dim); font-size: 12px; white-space: nowrap; flex-shrink:0; }
.input-prompt .pu { color: var(--comment); }
.input-prompt .pp { color: #1e3a5f; }
#cmd {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
  caret-color: var(--green);
  min-width: 0;
}
#cmd::placeholder { color: #2a2a2a; }

/* ═══════════════ OUTPUT CONTENT STYLES ═══════════════ */

/* Ghost / dim prompt echoed back */
.cmd-echo { color: var(--dim); font-size: 12px; margin: 12px 0 4px; }
.cmd-echo .ce-user { color: #2a5c2a; }
.cmd-echo .ce-path { color: #1e3a5f; }
.cmd-echo .ce-cmd  { color: var(--cyan); }

/* Boot / generic output lines */
.boot-line  { color: var(--dim); font-size: 12px; }
.boot-ok    { color: var(--green); }
.hint-line  { color: var(--comment); font-size: 11.5px; font-style: italic; }
.err-line   { color: var(--err); font-size: 12px; }

/* ═══ HEADER BLOCK ═══ */
.header-block { margin: 8px 0 4px; }
.header-grid {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 24px;
  align-items: start;
}
.big-name {
  font-size: clamp(18px, 3vw, 26px);
  font-weight: 700;
  letter-spacing: 4px;
  color: #fff;
  line-height: 1.1;
  margin-bottom: 3px;
}
.big-role {
  font-size: 11.5px;
  color: var(--cyan);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.contact-row { font-size: 11.5px; margin: 2px 0; }
.contact-row .lbl { color: var(--dim); display: inline-block; width: 54px; }
.contact-row .arr { color: var(--dimmer); margin: 0 5px; }
.contact-row .val { color: var(--text); }
.skills-row { margin-top: 12px; }
.skill-tag {
  display: inline-block;
  font-size: 11px;
  color: var(--yellow);
  background: #1a1a0e;
  border: 1px solid #2e2e1a;
  border-radius: 3px;
  padding: 1px 7px;
  margin: 2px 3px 2px 0;
}

/* ═══ VISUALS BOX (creature + cube) ═══ */
.visuals-box {
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.creature-box, .cube-box {
  background: #0d0d0d;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px 8px;
  text-align: center;
}
.creature-art {
  font-size: 11.5px;
  line-height: 1.38;
  white-space: pre;
  color: var(--orange);
  letter-spacing: 0;
}

/* animated eyes blink */
.eye { display: inline; animation: blink-eye 3.5s infinite; }
@keyframes blink-eye {
  0%, 90%, 100% { opacity: 1; }
  95%            { opacity: 0; }
}

.box-label { font-size: 9.5px; color: var(--comment); margin-top: 6px; font-style: italic; }

/* ═══ RUBIK'S CUBE ═══ */
.cube-title { font-size: 9.5px; color: var(--comment); font-style: italic; margin-bottom: 6px; }
.cube-grid {
  display: grid;
  grid-template-columns: repeat(3, 20px);
  grid-template-rows: repeat(3, 20px);
  gap: 2px;
  justify-content: center;
  margin: 0 auto;
}
.cube-cell {
  border-radius: 2px;
  transition: background-color 0.4s ease;
}
.cube-label { font-size: 9px; color: var(--dim); margin-top: 6px; }

/* ═══ LS OUTPUT ═══ */
.ls-block { margin: 6px 0; }
.ls-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  font-size: 12px;
  padding: 2px 0;
}
.ls-perms { color: var(--dim); font-size: 11px; }
.ls-name  { color: var(--blue); font-weight: 600; min-width: 160px; cursor: pointer; }
.ls-name:hover { color: var(--cyan); text-decoration: underline; }
.ls-desc  { color: var(--dim); font-size: 11px; font-style: italic; }

/* ═══ SECTION BLOCKS ═══ */
.section-block { margin: 8px 0; animation: fadeSlide .25s ease; }
@keyframes fadeSlide { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

.section-title {
  font-size: 11px;
  color: var(--comment);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title::after { content:''; flex:1; height:1px; background: var(--border); }

.entry { margin-bottom: 14px; }
.entry-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; flex-wrap: wrap; }
.entry-title { font-size: 13.5px; font-weight: 700; color: #fff; }
.entry-sub   { font-size: 11.5px; color: var(--cyan); font-style: italic; }
.entry-loc   { font-size: 11px; color: var(--dim); white-space: nowrap; }
.entry-date  { font-size: 11px; color: var(--dim); font-style: italic; white-space: nowrap; }
.entry-desc  { font-size: 12px; color: #777; margin-top: 5px; line-height: 1.65; }
.hl { color: var(--text); font-weight: 600; }

.proj-row { display: flex; gap: 6px; margin-bottom: 10px; }
.proj-bullet { color: var(--green); flex-shrink: 0; }
.proj-name { color: #fff; font-weight: 700; font-size: 13px; }
.proj-body { color: #777; font-size: 12px; line-height: 1.65; }
.proj-body .hl { color: var(--text); font-weight: 600; }

.pub-row { display: flex; gap: 6px; margin-bottom: 12px; }
.pub-title { color: #fff; font-weight: 700; font-size: 12.5px; }
.pub-conf  { color: var(--dim); font-size: 11px; }
.pub-body  { color: #777; font-size: 12px; margin-top: 4px; line-height: 1.65; }
.pub-body .hl { color: var(--text); font-weight: 600; }

/* ═══ NAV HINT ═══ */
.nav-hint {
  margin: 14px 0 4px;
  padding: 8px 12px;
  border: 1px solid var(--dimmer);
  border-radius: 4px;
  background: #0e0e0e;
  font-size: 11.5px;
}
.nav-hint-row { color: var(--dim); margin: 2px 0; }
.nav-hint-row .nh-cmd { color: var(--cyan); cursor: pointer; }
.nav-hint-row .nh-cmd:hover { text-decoration: underline; }
.nav-hint-row .nh-arrow { color: var(--comment); margin-right: 6px; }

/* ═══ HELP TABLE ═══ */
.help-row { display: flex; gap: 16px; font-size: 12px; margin: 3px 0; }
.help-cmd  { color: var(--cyan); min-width: 140px; }
.help-desc { color: var(--dim); }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 600px) {
  body { padding: 0; }
  .terminal { border-radius: 0; height: 100vh; max-height: none; }
  .header-grid { grid-template-columns: 1fr; }
  .visuals-box { justify-content: center; }
  .output { padding: 14px 16px; }
  .input-bar, .nav-bar { padding-left: 16px; padding-right: 16px; }
  .ls-desc { display: none; }
}

/* blink cursor on input */
#cmd:focus { }
</style>

<script>
// ══════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════
const out    = document.getElementById('output');
const input  = document.getElementById('cmd');
const cwdEl  = document.getElementById('cwd');
let cmdHistory = [], histIdx = -1;
let cubeInterval = null;

// ══════════════════════════════════════════════
//  Utilities
// ══════════════════════════════════════════════
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function scrollBottom() {
  out.scrollTop = out.scrollHeight;
}

function appendHTML(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  out.appendChild(d);
  scrollBottom();
  return d;
}

function appendLine(html, cls='boot-line') {
  appendHTML(`<div class="${cls}">${html}</div>`);
}

async function typeText(el, text, speed=18) {
  for (const ch of text) {
    el.textContent += ch;
    scrollBottom();
    await sleep(speed + Math.random() * 10);
  }
}

// Echo a command back to output
function echoCmd(cmd) {
  appendHTML(`
    <div class="cmd-echo">
      <span class="ce-user">diana@claude</span>:<span class="ce-path">${esc(cwdEl.textContent)}</span>$
      <span class="ce-cmd"> ${esc(cmd)}</span>
    </div>`);
}

// ══════════════════════════════════════════════
//  Rubik's Cube
// ══════════════════════════════════════════════
const CUBE_COLORS = ['#e06c75','#3fb950','#79b8ff','#e5c07b','#d4d4d4','#ce9178'];
let cubeState = [
  [0,1,2],
  [3,4,5],
  [2,0,3]
];

function renderCube() {
  const grid = document.getElementById('cube-grid');
  if (!grid) return;
  [...grid.children].forEach((cell, i) => {
    const r = Math.floor(i / 3), c = i % 3;
    cell.style.background = CUBE_COLORS[cubeState[r][c]];
  });
}

function stepCube() {
  const move = Math.floor(Math.random() * 6);
  if (move < 3) {
    // rotate row left
    const r = move, [a,b,c] = cubeState[r];
    cubeState[r] = [b,c,a];
  } else {
    // rotate col up
    const col = move - 3;
    const t = cubeState[0][col];
    cubeState[0][col] = cubeState[1][col];
    cubeState[1][col] = cubeState[2][col];
    cubeState[2][col] = t;
  }
  renderCube();
}

function initCube() {
  if (cubeInterval) clearInterval(cubeInterval);
  // do a quick scramble first
  for (let i = 0; i < 8; i++) stepCube();
  renderCube();
  cubeInterval = setInterval(stepCube, 900);
}

// ══════════════════════════════════════════════
//  Nav hint shown after each section

function navHint(backCmd, nextLabel, nextCmd) {

  appendHTML(`<div class="nav-hint">${backPart}${nextPart}</div>`);
}

// ══════════════════════════════════════════════
//  Command handler
// ══════════════════════════════════════════════
const SECTIONS = {
  education:    showEducation,
  experience:   showExperience,
  projects:     showProjects,
  publications: showPublications,
};

const ALIASES = { work: 'experience', papers: 'publications', pub: 'publications', edu: 'education', proj: 'projects' };

function run(raw) {
  const cmd  = raw.trim();
  const norm = cmd.toLowerCase();

  if (cmd) { cmdHistory.unshift(cmd); histIdx = -1; }

  echoCmd(cmd);

  if (norm === 'clear') {
    out.innerHTML = ''; showHeader(); return;
  }
  if (norm === 'whoami') {
    appendLine('<span style="color:#fff;font-weight:700">diana kostadinova</span> — software engineer', 'boot-line');
    return;
  }
  if (norm === 'ls' || norm === 'ls -la' || norm === 'ls -l') {
    showLs(); return;
  }
  if (norm === 'help' || norm === '--help' || norm === '-h') {
    showHelp(); return;
  }
  if (norm === 'cat skills.txt' || norm === 'skills') {
    appendHTML(`<div style="margin:4px 0;font-size:12px">
      <span class="skill-tag">Angular</span>
      <span class="skill-tag">Kotlin / Java Spring Boot</span>
      <span class="skill-tag">PostgreSQL</span>
      <span class="skill-tag">AI/ML Concepts</span>
    </div>`);
    return;
  }
  if (norm === 'cd ..' || norm === 'cd ~' || norm === 'cd' || norm === 'cd ~/resume') {
    cwdEl.textContent = '~/resume';
    appendLine('<span style="color:var(--dim)">back at ~/resume</span>');
    highlightPill(null);
    return;
  }
  if (norm.startsWith('cd ')) {
    let target = norm.slice(3).trim().replace(/\/$/, '');
    target = ALIASES[target] || target;
    if (SECTIONS[target]) { SECTIONS[target](); return; }
    appendLine(`<span class="err-line">cd: ${esc(target)}: No such file or directory</span>`);
    appendHTML(`<div class="hint-line">Try <span style="color:var(--cyan);cursor:pointer" onclick="run('ls')">ls</span> to see what's available.</div>`);
    return;
  }
  // cat readme.md
  if (norm === 'cat readme.md' || norm === 'readme' || norm === 'cat readme') {
    showReadme(); return;
  }
  // npm install
  if (norm === 'npm install' || norm === 'npm i' || norm === 'npm install diana' || norm === 'npm i diana') {
    npmInstall(); return;
  }
  // Easter eggs
  if (norm.includes('sudo')) {
    appendLine('<span style="color:var(--err)">permission denied: you are not in the sudoers file.</span>'); return;
  }
  if (norm === 'pwd') { appendLine(cwdEl.textContent); return; }
  if (norm === 'date') { appendLine(new Date().toString(), 'boot-line'); return; }
  if (norm === 'uname') { appendLine('claude-os 4.0.0 #1 SMP Anthropic', 'boot-line'); return; }
  if (norm === '') return;

  appendLine(`<span class="err-line">bash: ${esc(cmd.split(' ')[0])}: command not found</span>`);
  appendHTML(`<div class="hint-line">Type <span style="color:var(--cyan);cursor:pointer" onclick="run('help')">help</span> to see available commands.</div>`);
}

// ══════════════════════════════════════════════
//  Pill highlight
// ══════════════════════════════════════════════
function highlightPill(cmd) {
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.toggle('active', p.dataset.cmd === cmd);
  });
}

// ══════════════════════════════════════════════
//  Input listeners
// ══════════════════════════════════════════════
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    run(input.value);
    input.value = '';
    histIdx = -1;
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < cmdHistory.length - 1) { histIdx++; input.value = cmdHistory[histIdx]; }
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; input.value = cmdHistory[histIdx]; }
    else { histIdx = -1; input.value = ''; }
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    const v = input.value.trim().toLowerCase();
    const completions = ['cd education','cd experience','cd projects','cd publications','ls','help','clear','whoami','cat skills.txt','cat readme.md','npm install'];
    const match = completions.find(c => c.startsWith(v) && c !== v);
    if (match) input.value = match;
  }
});

// Pills click
document.querySelectorAll('.pill[data-cmd]').forEach(p => {
  p.addEventListener('click', () => { run(p.dataset.cmd); input.focus(); });
});

// Click terminal to focus input
document.getElementById('terminal').addEventListener('click', () => input.focus());

}
